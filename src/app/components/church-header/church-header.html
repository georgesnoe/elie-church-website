<!-- Responsive Header -->
<header class="sticky top-0 z-40 w-full bg-white shadow-md">
  <div class="container mx-auto flex items-center justify-between p-4">
    <!-- Logo -->
    <div class="flex items-center">
      <h1 class="text-2xl font-serif font-bold">Église méthodiste du Togo</h1>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center space-x-8">
      <a href="#" class="text-gray-600 hover:text-gray-900">Acceuil</a>
      <a href="#" class="text-gray-600 hover:text-gray-900">Activités</a>
      <a href="#" class="text-gray-600 hover:text-gray-900">Enseignements</a>
      <a href="#" class="text-gray-600 hover:text-gray-900"
        >Histoire de l'église</a
      >
    </nav>

    <!-- Mobile Menu Button -->
    <div class="md:hidden">
      <button (click)="toggleMenu()" class="text-gray-600 hover:text-gray-900">
        <lucide-icon [img]="Menu" size="24"></lucide-icon>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div
  class="mobile-menu-overlay"
  [ngClass]="{ active: isMenuOpen }"
  (click)="toggleMenu()"
></div>
<div class="mobile-menu" [ngClass]="{ active: isMenuOpen }">
  <div class="flex justify-end p-4">
    <button (click)="toggleMenu()" class="text-gray-600 hover:text-gray-900">
      <lucide-icon [img]="X" size="24"></lucide-icon>
    </button>
  </div>
  <nav class="flex flex-col space-y-6 p-4">
    <a href="#" class="text-gray-800 hover:bg-gray-100 p-2 rounded">Acceuil</a>
    <a href="#" class="text-gray-800 hover:bg-gray-100 p-2 rounded"
      >Activités</a
    >
    <a href="#" class="text-gray-800 hover:bg-gray-100 p-2 rounded"
      >Enseignements</a
    >
    <a href="#" class="text-gray-800 hover:bg-gray-100 p-2 rounded"
      >Histoire de l'église</a
    >
  </nav>
</div>
